name: Build Docker Images Manually

on:
  workflow_dispatch:  # Позволяет запускать вручную через UI
    inputs:
      project:
        description: 'Project to build (A, B, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ProjectA
          - ProjectB
      push_to_registry:
        description: 'Push to Docker Registry'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false

jobs:
  build-docker:
    runs-on: ubuntu-latest
    env:
      COMMIT_SHA: ${{ github.sha }}
      SHORT_SHA: ${{ github.sha }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Получаем всю историю для git diff

    - name: Set short SHA
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Detect changes for ProjectA
      id: changes-projectA
      run: |
        if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^ProjectA/' || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "projectA_changed=true" >> $GITHUB_OUTPUT
        else
          echo "projectA_changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Detect changes for ProjectB
      id: changes-projectB
      run: |
        if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^ProjectB/' || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "projectB_changed=true" >> $GITHUB_OUTPUT
        else
          echo "projectB_changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: inputs.push_to_registry == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build ProjectA Docker image
      if: |
        (inputs.project == 'all' || inputs.project == 'ProjectA') && 
        (steps.changes-projectA.outputs.projectA_changed == 'true' || inputs.project == 'ProjectA')
      uses: docker/build-push-action@v5
      with:
        context: ./ProjectA
        file: ./ProjectA/Dockerfile
        tags: |
          your-username/projecta:${{ env.SHORT_SHA }}
          your-username/projecta:latest
        push: ${{ inputs.push_to_registry == 'true' }}
        build-args: |
          COMMIT_SHA=${{ env.COMMIT_SHA }}

    - name: Build ProjectB Docker image
      if: |
        (inputs.project == 'all' || inputs.project == 'ProjectB') && 
        (steps.changes-projectB.outputs.projectB_changed == 'true' || inputs.project == 'ProjectB')
      uses: docker/build-push-action@v5
      with:
        context: ./ProjectB
        file: ./ProjectB/Dockerfile
        tags: |
          your-username/projectb:${{ env.SHORT_SHA }}
          your-username/projectb:latest
        push: ${{ inputs.push_to_registry == 'true' }}
        build-args: |
          COMMIT_SHA=${{ env.COMMIT_SHA }}

    - name: Print build summary
      run: |
        echo "=== Build Summary ==="
        echo "ProjectA changed: ${{ steps.changes-projectA.outputs.projectA_changed }}"
        echo "ProjectB changed: ${{ steps.changes-projectB.outputs.projectB_changed }}"
        echo "Commit SHA: ${{ env.COMMIT_SHA }}"
        echo "Short SHA: ${{ env.SHORT_SHA }}"
